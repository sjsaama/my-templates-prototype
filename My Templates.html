<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Templates — Section Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --accent:#747AF7;
  --accent-50:#E8EBFF;
  --accent-100:#D4DAFC;
  --ink:#444444;
  --gray:#797979;
  --gray-light:#B9B8B8;
  --border:#E7E7E9;
  --bg-chip:#F3F4F6;
  --bg-soft:#F9FAFB;
  --coral:#FF8888;
  --teal:#11C9C9;
  --teal-50:#E6F8F8;
  --teal-text:#0B9A9C;
  --amber:#F49908;
  --amber-bg:#FCEFD6;
  --amber-text:#C46A06;
  --row-pad:20px;
  --radius:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:'Lato',-apple-system,sans-serif;
  color:var(--ink);
  background:#fff;
  -webkit-font-smoothing:antialiased;
}
#root,.app{height:100vh;}
.app{display:flex;overflow:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

/* ───────── Sidebar ───────── */
.sidebar{width:90px;flex:0 0 90px;background:var(--accent);display:flex;flex-direction:column;align-items:center;}
.sidebar-logo{width:90px;height:100px;background:var(--accent-50);display:flex;align-items:center;justify-content:center;}
.logo-mark{display:flex;align-items:center;justify-content:center;}
.sidebar-items{flex:1;display:flex;flex-direction:column;align-items:center;width:100%;padding:24px 10px;gap:26px;}
.sidebar-items .nav-item:nth-child(4){margin-top:auto;}
.nav-item{width:70px;display:flex;flex-direction:column;align-items:center;gap:5px;color:#fff;border-radius:8px;padding:8px 0;transition:background .15s;}
.nav-item:hover{background:rgba(255,255,255,.12);}
.nav-item--active{background:rgba(255,255,255,.16);}
.nav-ico{width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:#fff;}
.nav-ico--badge{background:#fff;color:var(--accent);border-radius:50%;width:30px;height:30px;}
.nav-label{font-size:13px;font-weight:500;line-height:1.2;}

/* ───────── Template list panel ───────── */
.tpl-panel{width:300px;flex:0 0 300px;border-right:1px solid var(--border);position:relative;
  transition:flex-basis .26s cubic-bezier(.4,0,.2,1),width .26s cubic-bezier(.4,0,.2,1);}
.tpl-inner{width:300px;height:100%;display:flex;flex-direction:column;padding:46px 0 0;overflow:hidden;
  transition:opacity .18s;}
.tpl-panel--collapsed{width:0;flex-basis:0;border-right-color:transparent;}
.tpl-panel--collapsed .tpl-inner{opacity:0;pointer-events:none;}
.tpl-collapse{position:absolute;top:52px;right:-14px;width:28px;height:28px;border-radius:50%;background:#fff;
  border:1px solid var(--border);box-shadow:0 2px 6px rgba(40,47,111,.12);display:flex;align-items:center;justify-content:center;
  color:var(--gray);z-index:20;transition:color .12s,border-color .12s;}
.tpl-collapse:hover{color:var(--accent);border-color:var(--accent-100);}
.tpl-collapse svg{transform:rotate(90deg);transition:transform .22s;}
.tpl-panel--collapsed .tpl-collapse svg{transform:rotate(-90deg);}
.tpl-title{font-size:24px;font-weight:700;color:var(--ink);margin:0 0 28px;padding:0 24px;}
.tpl-request{margin:0 20px 26px;}
.btn-outline{border:2px solid var(--accent);border-radius:8px;padding:11px 16px;display:flex;flex-direction:column;align-items:center;gap:3px;background:#fff;transition:background .15s;}
.btn-outline:hover{background:var(--accent-50);}
.btn-outline-main{font-weight:700;font-size:14px;color:var(--accent);white-space:nowrap;}
.btn-outline-sub{font-size:12px;color:var(--accent);opacity:.85;}
.btn-outline-sub--coral{color:var(--coral);opacity:1;font-weight:700;}
.tpl-scroll{flex:1;overflow-y:auto;padding-bottom:30px;}
.tpl-group-label{font-size:14px;font-weight:700;color:var(--gray);background:var(--bg-chip);padding:11px 24px;}
.tpl-item{display:block;width:100%;text-align:left;padding:18px 24px;font-size:16px;color:var(--ink);border-bottom:1px solid var(--border);transition:background .12s;}
.tpl-item:hover{background:var(--bg-soft);}
.tpl-item--active{background:var(--accent-50);font-weight:700;box-shadow:inset 3px 0 0 var(--accent);}
.tpl-item-text{min-width:0;flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
.tpl-item-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.tpl-item-derivative{font-size:12px;font-weight:500;color:var(--gray);line-height:1.2;}
.ed-head-left{min-width:0;}
.ed-title{margin:0 0 8px;}
.ed-amd-hint{font-size:12.5px;color:var(--gray);margin-top:8px;padding:8px 12px;background:var(--bg-chip);border-radius:8px;line-height:1.45;}
.ed-amd-hint .ed-mono{font-size:12px;}
.link-btn{color:var(--accent);font-weight:700;font-size:13px;text-decoration:underline;text-underline-offset:2px;padding:0;}
.link-btn:hover{filter:brightness(.9);}

/* editable EHR chip */
.mapping-ro{display:inline-flex;max-width:100%;}
.mapping-edit{position:relative;display:inline-flex;max-width:100%;}
/* ───────── Editor ───────── */
.editor{flex:1;overflow-y:auto;background:#fff;}
.editor-inner{max-width:1000px;margin:0 auto;padding:46px 40px 80px;}
.ed-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:36px;}
.ed-title{font-size:24px;font-weight:700;margin:0 0 8px;color:var(--ink);}
.ed-meta{font-size:14px;color:var(--gray);}
.ed-mono{font-family:'Roboto Mono',monospace;color:var(--ink);font-size:13px;}
.btn-outline--req{min-width:260px;}

/* table */
.table{display:flex;flex-direction:column;gap:10px;}
.thead{display:grid;grid-template-columns:minmax(280px,1fr) 248px 132px 70px;align-items:center;
  background:var(--bg-chip);border:1px solid var(--border);border-radius:var(--radius);height:48px;padding:0 24px 0 51px;}
.table--amd .thead,.table--amd .row-head{grid-template-columns:minmax(240px,1fr) 200px 148px 124px 70px;}
.th{font-size:14px;font-weight:700;color:var(--gray);}
.th-config{text-align:left;}
.th-enable{text-align:center;}
.tbody{display:flex;flex-direction:column;gap:10px;}

/* row */
.row{border:1px solid var(--border);border-radius:var(--radius);background:#fff;transition:box-shadow .15s,border-color .15s;}
.row:hover{border-color:var(--accent-100);box-shadow:0 2px 10px rgba(40,47,111,.05);}
.row--open{border-color:var(--accent-100);}
.row--child{background:var(--bg-soft);}
.row--disabled{opacity:.55;}
.row--disabled .sname,.row--disabled .chip{color:var(--gray-light);}
.row--disabled:hover{box-shadow:none;border-color:var(--border);}
.expander--hidden{visibility:hidden;pointer-events:none;}
.tree-branch{position:relative;margin-left:28px;padding-left:18px;}
.tree-branch--d1{margin-left:24px;}
.tree-branch--d2{margin-left:20px;}
.tree-connector{position:absolute;left:0;top:0;bottom:12px;width:14px;border-left:2px solid var(--border);border-bottom:2px solid var(--border);border-bottom-left-radius:6px;}
.row--tree-last .tree-connector{bottom:50%;}
.row-inline{padding:4px 24px 16px 50px;}
.entity-panel{display:flex;flex-wrap:wrap;gap:20px 28px;align-items:flex-start;width:100%;}
.entity-segments{display:flex;flex-wrap:wrap;gap:16px 24px;}
.entity-group{display:flex;flex-direction:column;gap:5px;}
.entity-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--gray);}
.seg-btns{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff;}
.seg-btn{padding:8px 16px;font-size:13px;font-weight:600;color:var(--gray);background:transparent;border-right:1px solid var(--border);transition:background .12s,color .12s;}
.seg-btn:last-child{border-right:none;}
.seg-btn:hover:not(.seg-btn--on){background:var(--bg-chip);}
.seg-btn--on{background:var(--accent);color:#fff;}
.entity-checks{display:flex;flex-direction:column;gap:10px;min-width:220px;}
.entity-check{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--ink);cursor:pointer;}
.entity-check input{margin-top:3px;flex:0 0 auto;accent-color:var(--accent);}
.entity-check-text{display:flex;flex-direction:column;gap:2px;}
.entity-check-label{font-weight:600;line-height:1.3;}
.entity-check-hint{font-size:12px;font-weight:400;color:var(--gray);line-height:1.35;}
.def-neg{flex:1;min-width:220px;max-width:360px;}
.def-neg-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--gray);margin-bottom:6px;}
.def-neg-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--ink);}
.def-neg-input:focus{outline:none;border-color:var(--accent);}
.ed-empty{display:flex;align-items:center;justify-content:center;min-height:420px;}
.ed-empty p{font-size:18px;color:var(--gray-light);margin:0;}
.row-head{display:grid;grid-template-columns:minmax(280px,1fr) 248px 132px 70px;align-items:center;
  padding:var(--row-pad) 24px var(--row-pad) 14px;gap:0;}
.row-name{display:flex;align-items:center;gap:2px;min-width:0;flex:1;}
.grip{display:inline-flex;align-items:center;justify-content:center;width:22px;color:var(--gray-light);cursor:grab;flex:0 0 auto;}
.grip:active{cursor:grabbing;}
.expander{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;color:var(--gray);border-radius:6px;transition:transform .18s,background .12s;flex:0 0 auto;transform:rotate(-90deg);}
.expander:hover{background:var(--bg-chip);}
.expander--open{transform:rotate(0deg);color:var(--accent);}

.namecell{display:flex;align-items:center;gap:10px;min-width:0;flex:1;padding-left:4px;}
.row--details-open{border-color:var(--accent-100);}
.expander--tree{flex:0 0 auto;}
.toolbox--open{background:var(--accent-50);color:var(--accent);}
.sname{font-size:16px;font-weight:700;color:var(--ink);white-space:nowrap;flex:0 0 auto;}
.sname--ghost{font-weight:700;}

/* badges */
.static-badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent-50);color:var(--accent);
  font-size:10px;font-weight:700;letter-spacing:.02em;padding:3px 8px;border-radius:1000px;text-transform:uppercase;cursor:default;}
.cbadge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 8px 3px 6px;font-size:13px;font-weight:700;cursor:default;}
.cbadge--macro{background:var(--accent);color:#fff;}
.cbadge--sum{background:var(--teal-50);color:var(--teal-text);}
.cbadge-ico{display:inline-flex;}
.cbadge--macro .cbadge-ico svg{width:15px;height:15px;}
.cbadge--sum .cbadge-ico svg{width:15px;height:15px;}

/* info tooltip */
.info-wrap{position:relative;display:inline-flex;align-items:center;}
.info-ico{color:var(--gray-light);display:inline-flex;cursor:help;}
.info-ico:hover{color:var(--accent);}
.tooltip{position:absolute;bottom:calc(100% + 9px);left:50%;transform:translateX(-50%) translateY(4px);
  background:#2A2D3A;color:#fff;font-size:12px;font-weight:500;line-height:1.45;padding:9px 12px;border-radius:8px;
  width:max-content;max-width:240px;opacity:0;pointer-events:none;transition:opacity .14s,transform .14s;z-index:40;text-transform:none;letter-spacing:0;}
.tooltip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#2A2D3A;}
.info-wrap:hover .tooltip{opacity:1;transform:translateX(-50%) translateY(0);}

/* chips */
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg-chip);border-radius:5px;padding:5px 10px;
  font-size:12px;color:var(--ink);max-width:100%;}
.chip--mono{font-family:'Roboto Mono',monospace;}
.chip--ehr{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:228px;display:block;line-height:1.4;}
.chip--amd-detail{font-size:11px;line-height:1.35;max-width:140px;white-space:normal;}

/* config dropdown */
.row-config{justify-self:start;}
.dd{position:relative;}
.dd-trigger{cursor:pointer;justify-content:space-between;min-width:114px;border:1px solid transparent;transition:border-color .12s;}
.dd-trigger:hover{border-color:var(--accent-100);}
.dd-caret{color:var(--gray);display:inline-flex;}
.dd-scrim{position:fixed;inset:0;z-index:30;}
.dd-menu{position:absolute;top:calc(100% + 4px);left:0;z-index:31;background:#fff;border:1px solid var(--border);
  border-radius:8px;box-shadow:0 8px 24px rgba(40,47,111,.14);padding:5px;min-width:124px;}
.dd-opt{display:block;width:100%;text-align:left;padding:8px 10px;font-size:13px;font-family:'Roboto Mono',monospace;border-radius:6px;}
.dd-opt:hover{background:var(--bg-chip);}
.dd-opt--sel{background:var(--accent-50);color:var(--accent);font-weight:500;}

/* enable cell */
.row-enable{display:flex;align-items:center;justify-content:flex-end;gap:12px;}
.toolbox{position:relative;width:30px;height:30px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:var(--gray);transition:background .12s,color .12s;}
.toolbox:hover{background:var(--accent-50);color:var(--accent);}
.toolbox-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid #fff;}

/* toggle */
.toggle{width:35px;height:20px;border-radius:1000px;background:var(--border);position:relative;transition:background .18s;flex:0 0 auto;}
.toggle--on{background:var(--accent);}
.toggle--disabled{opacity:.5;cursor:not-allowed;}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.toggle--on .toggle-knob{left:17px;}

/* ghost rows */
.row--ghost{background:var(--bg-soft);border-style:dashed;}
.row--ghost:hover{box-shadow:none;}
.row--ghost .row-head{grid-template-columns:1fr auto;padding:16px 24px 16px 14px;}
.row--ghost .row-name{flex:1;}
.grip--ghost{color:#D2D2D6;}
.row-ghost-spacer{display:none;}
.ghost-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:1000px;}
.ghost-badge--blue{background:var(--accent-50);color:var(--accent);}
.ghost-badge--teal{background:var(--teal-50);color:var(--teal-text);}

/* advanced inline panel */
.adv{border-top:1px solid var(--border);padding:22px 28px 20px 50px;background:var(--bg-soft);border-radius:0 0 var(--radius) var(--radius);}
.adv-cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
.adv-col{}
.adv-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;}
.adv-head-ico{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:#fff;}
.adv-head-ico--purple{background:var(--accent);}
.adv-head-ico--purple svg{width:14px;height:14px;}
.adv-head-ico--teal{background:var(--teal);}
.adv-head-ico--teal svg{width:15px;height:15px;}
.adv-count{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-50);border-radius:1000px;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;}
.adv-count--teal{color:var(--teal-text);background:var(--teal-50);}
.adv-empty{font-size:13px;color:var(--gray-light);padding:10px 0;}
.adv-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:8px;}
.adv-item-name{font-size:14px;color:var(--ink);font-weight:500;}
.mode-tag{font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;padding:3px 8px;border-radius:5px;white-space:nowrap;}
.tag--amber{background:var(--amber-bg);color:var(--amber-text);}
.tag--slate{background:#EEF0F3;color:#697086;}
.tag--purple{background:var(--accent-50);color:var(--accent);}
.tag--teal{background:var(--teal-50);color:var(--teal-text);}
.adv-static{margin-top:18px;border-top:1px dashed var(--border);padding-top:16px;}
.adv-static-head{font-size:13px;font-weight:700;color:var(--gray);margin-bottom:10px;}
.adv-static-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;line-height:1.5;}
.adv-static-pos{flex:0 0 78px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--accent);background:var(--accent-50);padding:4px 8px;border-radius:5px;text-align:center;}
.adv-static-txt{font-size:14px;color:var(--ink);line-height:1.5;}
.adv-foot{margin-top:16px;}
.btn-text{display:inline-flex;align-items:center;gap:7px;color:var(--accent);font-weight:700;font-size:13px;padding:7px 0;}
.btn-text:hover{text-decoration:underline;}

/* ───────── Modal ───────── */
.modal-scrim{position:fixed;inset:0;background:rgba(30,30,46,.4);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;padding:40px;animation:fade .15s ease;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.modal{background:#fff;border-radius:16px;width:min(920px,100%);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(20,20,40,.3);animation:pop .18s ease;}
@keyframes pop{from{transform:translateY(10px) scale(.99);opacity:0;}to{transform:none;opacity:1;}}
.modal-head{background:var(--accent-50);padding:22px 28px;position:relative;}
.modal-head h2{margin:0;font-size:20px;font-weight:900;color:var(--accent);letter-spacing:.01em;}
.modal-sub{font-size:13px;color:var(--gray);font-weight:500;}
.modal-x{position:absolute;top:20px;right:22px;color:var(--coral);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.modal-x:hover{background:rgba(255,136,136,.15);}
.modal-body{padding:26px 28px;overflow-y:auto;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px;}

.cl-head{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:12px;}
.cl-ico{width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:#fff;}
.cl-ico--purple{background:var(--accent);}
.cl-ico--purple svg{width:15px;height:15px;}
.cl-ico--teal{background:var(--teal);}
.cl-ico--teal svg{width:16px;height:16px;}
.cl-count{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-50);border-radius:1000px;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;}
.cl-count--teal{color:var(--teal-text);background:var(--teal-50);}
.cl-box{border:1px solid var(--border);border-radius:10px;padding:8px;min-height:120px;display:flex;flex-direction:column;gap:6px;}
.cl-empty{color:var(--gray-light);font-size:13px;padding:20px 10px;text-align:center;}
.cl-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg-soft);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.cl-name{font-size:14px;font-weight:500;color:var(--ink);}
.cl-right{display:flex;align-items:center;gap:6px;}
.cl-mode{font-family:'Roboto Mono',monospace;font-size:12px;color:var(--ink);border:1px solid var(--border);border-radius:6px;padding:5px 8px;background:#fff;cursor:pointer;}
.cl-x{width:28px;height:28px;border-radius:6px;color:var(--gray-light);display:inline-flex;align-items:center;justify-content:center;}
.cl-x:hover{background:rgba(255,136,136,.15);color:var(--coral);}

.static-block{}
.static-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.static-hint{font-size:13px;color:var(--gray);margin:0 0 16px;}
.static-field{margin-bottom:14px;}
.static-field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--accent);margin-bottom:6px;}
.static-field textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'Lato',sans-serif;font-size:14px;color:var(--ink);resize:vertical;line-height:1.5;transition:border-color .12s;}
.static-field textarea:focus{outline:none;border-color:var(--accent);}

.modal-foot{display:flex;justify-content:flex-end;gap:12px;padding:18px 28px;border-top:1px solid var(--border);background:#fff;}
.btn-ghost{padding:11px 22px;border-radius:10px;border:1px solid var(--border);font-weight:700;font-size:14px;color:var(--ink);background:#fff;}
.btn-ghost:hover{background:var(--bg-chip);}
.btn-teal{padding:11px 26px;border-radius:10px;background:var(--teal);color:#fff;font-weight:900;font-size:14px;letter-spacing:.02em;box-shadow:0 4px 12px rgba(17,201,201,.32);}
.btn-teal:hover{filter:brightness(1.04);}
.btn-teal--warn{background:var(--coral);box-shadow:0 4px 12px rgba(255,136,136,.32);}
.modal--confirm{width:min(520px,100%);}
.confirm-body{padding-top:4px;}
.confirm-lead{font-size:14px;line-height:1.55;color:var(--ink);margin:0 0 14px;}
.confirm-list{margin:0;padding-left:20px;font-size:13.5px;line-height:1.55;color:var(--gray);}
.confirm-list li{margin-bottom:8px;}
.confirm-list--warn li{color:var(--ink);}
.confirm-list--warn li::marker{color:var(--coral);}
.modal--request{width:min(720px,100%);}
.modal--disable{width:min(480px,100%);}
.modal-foot--split{justify-content:flex-end;gap:12px;}
.btn-outline-danger{padding:11px 22px;border-radius:10px;border:2px solid var(--accent);font-weight:700;font-size:14px;color:var(--accent);background:#fff;}
.btn-outline-danger:hover{background:var(--accent-50);}
.btn-teal--full{width:100%;margin-top:8px;}
.req-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px;}
.req-field label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:6px;}
.req-optional{font-weight:500;color:var(--gray-light);}
.req-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--ink);}
.req-input:focus{outline:none;border-color:var(--accent);}
.req-textarea{resize:vertical;min-height:100px;}
.req-sub-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.req-input--inline{flex:1;min-width:180px;}
.req-check{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);cursor:pointer;margin-right:16px;margin-bottom:8px;}
.req-apply{margin-bottom:20px;}
.req-apply-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;}
.req-apply-label{font-size:12px;font-weight:700;color:var(--gray);margin:10px 0 6px;}
.req-checks{display:flex;flex-wrap:wrap;}
.req-pending{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.req-pending-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px;}
.req-pending-item{padding:14px 0;border-bottom:1px solid var(--border);}
.req-pending-head{display:flex;justify-content:space-between;gap:12px;margin-bottom:6px;}
.req-pending-name{font-size:15px;font-weight:700;color:var(--ink);}
.req-pending-when{font-size:12px;color:var(--gray);}
.req-pending-desc{font-size:13px;color:var(--gray);line-height:1.5;margin:0 0 8px;}
.req-pending-tpls{display:flex;flex-wrap:wrap;gap:6px;}
.req-pending-tag{font-size:11px;font-weight:700;padding:4px 8px;border-radius:5px;background:var(--bg-chip);color:var(--gray);}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#2A2D3A;color:#fff;font-size:14px;font-weight:500;padding:13px 22px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:200;animation:pop .18s ease;}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:1000px;border:2px solid #fff;}
::-webkit-scrollbar-thumb:hover{background:var(--gray-light);}
</style>
</head>
